name: Build Platform Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to build assets for (e.g. v0.21.0)'
        required: true

permissions:
  contents: write

jobs:
  build-platforms:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: darwin-x64
            runner: macos-13
          - target: darwin-arm64
            runner: macos-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Package tarball
        run: |
          PKG_NAME="course-${{ matrix.target }}"
          mkdir -p "${PKG_NAME}"
          cp -r dist bin package.json README.md LICENSE "${PKG_NAME}/"
          bun install --production --frozen-lockfile --no-summary
          cp -r node_modules "${PKG_NAME}/"
          tar czf "${PKG_NAME}.tar.gz" "${PKG_NAME}"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release upload "$TAG" \
            "course-${{ matrix.target }}.tar.gz" \
            --clobber
